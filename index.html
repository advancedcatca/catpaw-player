<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>猫jio Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/wavesurfer.js/6.6.3/wavesurfer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  body{font-family:Arial,Helvetica,sans-serif;max-width:800px;margin:0 auto;padding:20px;background:#f8f9fa}
  h1{margin:0;color:#333}
  .container{background:#fff;border-radius:12px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,.1)}

  /* 标题栏 */
  .header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .header-actions{display:flex;gap:8px;align-items:center}

  /* + 添加按钮（label 触发） */
  .add-label{
    background:#27ae60;color:#fff;border:none;
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;line-height:1;cursor:pointer;
    box-shadow:0 2px 6px rgba(39,174,96,.35);
    transition:background .15s;
    user-select:none;
  }
  .add-label:hover{background:#219a52}
  #audioFiles{position:absolute;left:-9999px;top:-9999px;opacity:0;width:1px;height:1px}

  .icon-only{background:transparent;color:#6b7280;border:none;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
  .icon-only:hover{background:#f1f5f9}

  .message-box{display:none;margin:0 0 10px;padding:8px 10px;border-radius:6px;text-align:center;font-size:14px}
  .success-message{display:block;background:#d4edda;color:#155724;border:1px solid #c3e6cb}
  .error-message{display:block;background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}

  .small-button{font-size:14px;padding:6px 10px;border-radius:4px;background:#4a6fa5;color:#fff;border:none;cursor:pointer}
  .inline-buttons{display:flex;flex-wrap:wrap;gap:8px;align-items:center}

  .playlist-box{border:1px solid #e1e4e8;border-radius:10px;padding:8px;max-height:300px;overflow:auto;background:#fafafa}
  .playlist-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;font-weight:500;color:#444}
  .playlist-item:hover{background:#eef6ff}
  .playlist-item.active{background:#e3f2fd;border:1px solid #2196f3}
  .playlist-item.selected{outline:2px solid #a3c5ff;background:#f0f8ff}
  .playlist-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .np{width:10px;height:10px;border-radius:50%;background:#4a6fa5;opacity:0;flex:0 0 auto}
  .playlist-item.active .np{opacity:1;animation:pulse 1.2s infinite ease-in-out}
  @keyframes pulse{0%{transform:scale(.9);opacity:.6}50%{transform:scale(1.2);opacity:1}100%{transform:scale(.9);opacity:.6}}

  .current-player{margin-top:18px;border:1px solid #e1e4e8;border-radius:10px;padding:16px;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.05)}
  .current-title{font-weight:700;color:#2c3e50;margin-bottom:10px}
  .waveform-container{margin-top:8px;border:1px solid #e1e4e8;border-radius:8px;padding:12px;background:#f9f9f9}
  #waveform{height:100px}
  .time-display{font-family:monospace;text-align:center;margin:8px 0;color:#666}

  .round-row{display:flex;justify-content:center;gap:8px;margin-top:6px;flex-wrap:wrap}
  .round-btn{background:#4a6fa5;color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:none;cursor:pointer}
  .round-btn:hover{background:#2c3e50}

  .speed-control{display:flex;align-items:center;margin-top:12px;background:#f8f9fa;padding:8px;border-radius:8px;border:1px solid #e1e4e8;font-size:14px}
  .speed-control label{margin-right:10px;font-weight:600}
  .speed-control select{padding:6px;border-radius:4px;border:1px solid #ddd}

  .loop-section{margin-top:12px;background:#f0f7ff;padding:12px;border-radius:8px;border:1px dashed #4a6fa5}
  .loop-header{font-weight:700;margin-bottom:8px}
  .loop-times{display:flex;gap:10px;margin-top:8px}
  .loop-input{width:80px;padding:5px;border-radius:4px;border:1px solid #ddd}

  /* 简洁模式 */
  .lite-mode-container{position:fixed;inset:0;background:#f8f9fa;z-index:1000;display:none;justify-content:center;align-items:center}
  .lite-player{width:280px;max-width:92vw;padding:8px;border-radius:10px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .lite-toolbar{display:flex;justify-content:flex-end;gap:6px}
  .lite-toggle{background:#4a6fa5;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:none}
  .lite-speed select{font-size:11px;padding:2px 6px}
  .progress-container{width:100%;height:6px;background:#e1e4e8;border-radius:4px;margin:6px 0;overflow:hidden}
  .progress-bar{height:100%;width:0;background:#4a6fa5}
  .lite-controls{display:flex;justify-content:center;gap:6px}
  .lite-control-button{background:#4a6fa5;color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none}
  .lite-control-button:hover{background:#2c3e50}
</style>
</head>
<body>
<div class="container">

  <!-- 标题 + 操作按钮 -->
  <div class="header-row">
    <h1>猫jio Player</h1>
    <div class="header-actions">
      <label for="audioFiles" class="add-label" title="添加文件">＋</label>
      <input type="file" id="audioFiles" accept=".mp3,.wav,.ogg,.m4a,.flac" multiple>
      <button id="clearPlaylistBtn" class="icon-only" title="清空列表">🗑️</button>
    </div>
  </div>

  <div id="message" class="message-box"></div>

  <!-- 播放列表 -->
  <div id="playlistBox" class="playlist-box" tabindex="0" aria-label="播放列表（↑↓选择，Enter播放）"></div>

  <!-- 播放器主体 -->
  <div id="currentPlayer" class="current-player" style="display:none;">
    <div id="currentTitle" class="current-title">当前播放：</div>

    <div class="waveform-container"><div id="waveform"></div></div>
    <div class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></div>

    <div class="round-row">
      <button id="fullPrevButton" class="round-btn" title="上一首">⏮️</button>
      <button id="fullRewButton" class="round-btn" title="后退5秒">⏪</button>
      <button id="fullPlayPauseButton" class="round-btn" title="播放/暂停">▶️</button>
      <button id="fullFwdButton" class="round-btn" title="前进5秒">⏩</button>
      <button id="fullNextButton" class="round-btn" title="下一首">⏭️</button>
      <button id="toggleModeBtn" class="round-btn" title="切换简洁模式">🔄</button>
    </div>

    <div class="speed-control">
      <label for="playbackSpeed">播放速度:</label>
      <select id="playbackSpeed">
        <option value="0.5">0.5x</option><option value="0.75">0.75x</option>
        <option value="1" selected>1.0x (正常)</option>
        <option value="1.25">1.25x</option><option value="1.5">1.5x</option>
        <option value="1.75">1.75x</option><option value="2">2.0x</option>
      </select>
    </div>

    <div class="loop-section">
      <div class="loop-header">选段复读</div>
      <div class="inline-buttons" style="gap:8px">
        <button id="setLoopStartBtn" class="small-button">设为开始</button>
        <button id="setLoopEndBtn" class="small-button">设为结束</button>
        <button id="startLoopBtn" class="small-button">开始复读</button>
        <button id="stopLoopBtn" class="small-button">停止复读</button>
      </div>
      <div style="margin-top:6px">
        <label for="loopCount">复读次数 (0=无限):</label>
        <input id="loopCount" type="number" min="0" value="3" class="loop-input">
      </div>
      <div class="loop-times">
        <div><label for="loopStart">开始(秒):</label><input id="loopStart" type="number" min="0" step="0.1" value="0" class="loop-input"></div>
        <div><label for="loopEnd">结束(秒):</label><input id="loopEnd" type="number" min="0" step="0.1" value="0" class="loop-input"></div>
      </div>
    </div>
  </div>
</div>

<!-- 简洁模式 -->
<div id="liteModeContainer" class="lite-mode-container">
  <div class="lite-player">
    <div class="lite-toolbar">
      <button id="liteToggleBtn" class="lite-toggle" title="切换完整模式">🔄</button>
      <div class="lite-speed">
        <select id="litePlaybackSpeed">
          <option value="0.5">0.5x</option><option value="0.75">0.75x</option>
          <option value="1" selected>1x</option><option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option><option value="1.75">1.75x</option>
          <option value="2">2x</option>
        </select>
      </div>
    </div>
    <div id="liteTitleDisplay" style="text-align:center;font-weight:600;margin:6px 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">当前播放：</div>
    <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
    <div class="time-display"><span id="liteCurrentTime">00:00</span> / <span id="liteTotalTime">00:00</span></div>
    <div class="lite-controls">
      <button id="litePrevButton" class="lite-control-button">⏮️</button>
      <button id="liteRewindButton" class="lite-control-button">⏪</button>
      <button id="litePlayPauseButton" class="lite-control-button">▶️</button>
      <button id="liteForwardButton" class="lite-control-button">⏩</button>
      <button id="liteNextButton" class="lite-control-button">⏭️</button>
    </div>
  </div>
</div>

<script>
  /*
   * iOS / Safari WebView 兼容方案：
   * 1. backend: 'MediaElement'  → 用原生 <audio> 标签播放，绕开 WebAudio AudioContext 限制
   * 2. 统一共享一个 <audio> 元素，WaveSurfer 负责绘制波形
   * 3. 去掉所有 async/await ensureAudioReady，按钮点击直接同步调用 play()/pause()
   * 4. 文件选择后只加载不自动播，防止 iOS 的自动播放策略拦截
   */

  let wavesurfer = null, isLooping = false, loopCounter = 0;
  let audioFiles = [], currentAudioFile = null, selectedIndex = -1;
  let wsReady = false; // wavesurfer 当前 track 是否 ready

  // 共享 <audio> 元素
  const audioEl = document.createElement('audio');
  audioEl.preload = 'auto';
  document.body.appendChild(audioEl);

  function showMessage(t, type) {
    const m = document.getElementById('message');
    m.textContent = t;
    m.className = 'message-box ' + (type === 'error' ? 'error-message' : 'success-message');
  }
  function isAudioExt(n) { return ['.mp3','.wav','.ogg','.m4a','.flac','.aac'].some(x => n.toLowerCase().endsWith(x)); }
  function sortPlaylist() { audioFiles.sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true, sensitivity:'base'})); }

  function renderPlaylist() {
    const box = document.getElementById('playlistBox');
    box.innerHTML = '';
    if (!audioFiles.length) {
      box.innerHTML = '<div class="playlist-item" style="justify-content:center;color:#aaa;font-size:14px">点击右上角 ＋ 添加音频</div>';
      return;
    }
    audioFiles.forEach((f, i) => {
      const li = document.createElement('div');
      li.className = 'playlist-item'; li.dataset.index = i;
      const dot = document.createElement('div'); dot.className = 'np';
      const name = document.createElement('span'); name.className = 'playlist-name'; name.textContent = f.name;
      li.appendChild(dot); li.appendChild(name);
      if (currentAudioFile && currentAudioFile.name === f.name) li.classList.add('active');
      if (i === selectedIndex) li.classList.add('selected');
      // 点击列表项 → 同步切换并播放（用户手势，iOS 允许）
      li.addEventListener('click', () => loadAndPlay(f, i));
      box.appendChild(li);
    });
  }

  function setSelected(i) {
    if (!audioFiles.length) { selectedIndex = -1; return; }
    selectedIndex = Math.max(0, Math.min(audioFiles.length - 1, i));
    renderPlaylist();
    const el = document.querySelector(`.playlist-item[data-index="${selectedIndex}"]`);
    if (el) el.scrollIntoView({block:'nearest'});
  }

  // ── WaveSurfer 初始化（MediaElement 后端）──────────────────────────────
  function initWaveSurfer() {
    wavesurfer = WaveSurfer.create({
      container: '#waveform',
      backend: 'MediaElement',   // ← 关键：使用 HTML5 Audio，iOS 兼容
      mediaElement: audioEl,     // ← 共享同一个 audio 元素
      waveColor: '#4a6fa5',
      progressColor: '#2c3e50',
      cursorColor: '#e74c3c',
      barWidth: 2, barGap: 1,
      height: 100,
      normalize: true,
      interact: true
    });

    wavesurfer.on('ready', () => {
      wsReady = true;
      const dur = wavesurfer.getDuration();
      document.getElementById('totalTime').textContent = formatTime(dur);
      document.getElementById('liteTotalTime').textContent = formatTime(dur);
      document.getElementById('loopEnd').value = dur.toFixed(1);
      updateLiteProgress(0, dur);
    });

    wavesurfer.on('audioprocess', () => {
      const t = wavesurfer.getCurrentTime(), d = wavesurfer.getDuration();
      document.getElementById('currentTime').textContent = formatTime(t);
      updateLiteProgress(t, d);
    });
    wavesurfer.on('seek', () => {
      const t = wavesurfer.getCurrentTime(), d = wavesurfer.getDuration();
      document.getElementById('currentTime').textContent = formatTime(t);
      updateLiteProgress(t, d);
    });
    wavesurfer.on('play',   () => syncPlayIcons(true));
    wavesurfer.on('pause',  () => syncPlayIcons(false));
    wavesurfer.on('finish', () => { syncPlayIcons(false); if (!isLooping) navTrack(1); });
    wavesurfer.on('error',  e  => showMessage('播放错误：' + e, 'error'));
  }
  initWaveSurfer();

  function syncPlayIcons(playing) {
    document.getElementById('fullPlayPauseButton').textContent = playing ? '⏸️' : '▶️';
    document.getElementById('litePlayPauseButton').textContent = playing ? '⏸️' : '▶️';
  }
  function updateLiteProgress(current, duration) {
    const pct = duration ? (current / duration) * 100 : 0;
    document.getElementById('progressBar').style.width = (pct || 0) + '%';
    document.getElementById('liteCurrentTime').textContent = formatTime(current || 0);
  }
  function formatTime(s) {
    const m = Math.floor(s / 60), ss = Math.floor(s % 60);
    return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  }

  // ── 加载并立即播放（用户手势上下文中调用）────────────────────────────
  function loadAndPlay(file, index) {
    wsReady = false;
    currentAudioFile = file; currentAudioFile.index = index;
    selectedIndex = index;
    document.getElementById('currentPlayer').style.display = 'block';
    document.getElementById('currentTitle').textContent = '当前播放：' + file.name;
    document.getElementById('liteTitleDisplay').textContent = file.name;
    renderPlaylist();

    // MediaElement 后端：先把 src 塞给 audio 元素，再让 WaveSurfer load
    audioEl.src = file.path;
    audioEl.load();
    wavesurfer.load(file.path);

    // ready 后自动播放
    wavesurfer.once('ready', () => {
      audioEl.play().then(() => {
        syncPlayIcons(true);
      }).catch(() => {
        // 播放被拦截时静默，用户可手动按播放
        syncPlayIcons(false);
      });
    });
  }

  // ── 仅加载不播放（文件选择时调用，避免触发自动播放拦截）────────────
  function loadOnly(file, index) {
    wsReady = false;
    currentAudioFile = file; currentAudioFile.index = index;
    selectedIndex = index;
    document.getElementById('currentPlayer').style.display = 'block';
    document.getElementById('currentTitle').textContent = '当前播放：' + file.name;
    document.getElementById('liteTitleDisplay').textContent = file.name;
    renderPlaylist();
    audioEl.src = file.path;
    audioEl.load();
    wavesurfer.load(file.path);
  }

  // ── 播放 / 暂停（用户手势，直接同步调用）────────────────────────────
  function togglePlayPause() {
    if (!currentAudioFile) return;
    if (audioEl.paused) {
      audioEl.play().then(() => syncPlayIcons(true)).catch(()=>{});
    } else {
      audioEl.pause();
      syncPlayIcons(false);
    }
  }

  // ── 文件添加 ──────────────────────────────────────────────────────────
  document.getElementById('audioFiles').addEventListener('change', e => {
    const files = Array.from(e.target.files)
      .filter(f => f.type.startsWith('audio/') || isAudioExt(f.name))
      .map(f => ({name: f.name, path: URL.createObjectURL(f), file: f}));
    if (!files.length) return;
    const isFirst = !currentAudioFile;
    audioFiles.push(...files); sortPlaylist(); renderPlaylist();
    showMessage(`已添加 ${files.length} 个文件`, 'success');
    if (selectedIndex < 0) setSelected(0);
    // 首次添加：仅加载，不强制播放（避免 iOS 自动播放拦截弹窗）
    if (isFirst) loadOnly(audioFiles[0], 0);
    e.target.value = '';
  });

  // ── 键盘导航 ──────────────────────────────────────────────────────────
  document.getElementById('playlistBox').addEventListener('keydown', e => {
    if (!audioFiles.length) return;
    if (e.key === 'ArrowDown') { setSelected(selectedIndex < 0 ? 0 : selectedIndex + 1); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { setSelected(selectedIndex < 0 ? 0 : selectedIndex - 1); e.preventDefault(); }
    else if (e.key === 'Home') { setSelected(0); e.preventDefault(); }
    else if (e.key === 'End') { setSelected(audioFiles.length - 1); e.preventDefault(); }
    else if (e.key === 'Enter') { if (selectedIndex >= 0) loadAndPlay(audioFiles[selectedIndex], selectedIndex); }
  });

  // ── 切换曲目 ──────────────────────────────────────────────────────────
  function navTrack(step) {
    if (!audioFiles.length || !currentAudioFile) return;
    let i = audioFiles.findIndex(f => f.name === currentAudioFile.name);
    if (i < 0) i = 0;
    let n = i + step;
    if (n < 0) n = audioFiles.length - 1;
    if (n >= audioFiles.length) n = 0;
    loadAndPlay(audioFiles[n], n);
  }

  // ── 主控按钮（全部同步，不 await）─────────────────────────────────────
  document.getElementById('fullPlayPauseButton').addEventListener('click', togglePlayPause);
  document.getElementById('fullPrevButton').addEventListener('click', () => navTrack(-1));
  document.getElementById('fullNextButton').addEventListener('click', () => navTrack(1));
  document.getElementById('fullRewButton').addEventListener('click', () => {
    if (!currentAudioFile) return;
    audioEl.currentTime = Math.max(0, audioEl.currentTime - 5);
  });
  document.getElementById('fullFwdButton').addEventListener('click', () => {
    if (!currentAudioFile) return;
    audioEl.currentTime = Math.min(audioEl.duration || 0, audioEl.currentTime + 5);
  });
  document.getElementById('toggleModeBtn').addEventListener('click', () => {
    document.getElementById('liteModeContainer').style.display = 'flex';
  });

  // ── 简洁模式按钮 ──────────────────────────────────────────────────────
  document.getElementById('liteToggleBtn').addEventListener('click', () => { document.getElementById('liteModeContainer').style.display = 'none'; });
  document.getElementById('litePlayPauseButton').addEventListener('click', togglePlayPause);
  document.getElementById('liteRewindButton').addEventListener('click', () => { if (currentAudioFile) audioEl.currentTime = Math.max(0, audioEl.currentTime - 5); });
  document.getElementById('liteForwardButton').addEventListener('click', () => { if (currentAudioFile) audioEl.currentTime = Math.min(audioEl.duration || 0, audioEl.currentTime + 5); });
  document.getElementById('litePrevButton').addEventListener('click', () => navTrack(-1));
  document.getElementById('liteNextButton').addEventListener('click', () => navTrack(1));

  // ── 速度同步（直接设 audioEl.playbackRate，同时同步 wavesurfer）──────
  function setSpeed(v) {
    audioEl.playbackRate = v;
    try { wavesurfer.setPlaybackRate(v); } catch(_) {}
    document.getElementById('playbackSpeed').value = v;
    document.getElementById('litePlaybackSpeed').value = v;
  }
  document.getElementById('playbackSpeed').addEventListener('change', function() { setSpeed(parseFloat(this.value)); });
  document.getElementById('litePlaybackSpeed').addEventListener('change', function() { setSpeed(parseFloat(this.value)); });

  // ── 清空列表 ──────────────────────────────────────────────────────────
  document.getElementById('clearPlaylistBtn').addEventListener('click', () => {
    if (!audioFiles.length) return;
    audioEl.pause(); audioEl.src = '';
    audioFiles.forEach(f => { try { URL.revokeObjectURL(f.path); } catch(_) {} });
    audioFiles = []; selectedIndex = -1; currentAudioFile = null; wsReady = false;
    syncPlayIcons(false);
    renderPlaylist();
    document.getElementById('currentPlayer').style.display = 'none';
    showMessage('已清空列表', 'success');
  });

  // ── 选段复读 ──────────────────────────────────────────────────────────
  document.getElementById('setLoopStartBtn').addEventListener('click', () => {
    document.getElementById('loopStart').value = (audioEl.currentTime || 0).toFixed(1);
  });
  document.getElementById('setLoopEndBtn').addEventListener('click', () => {
    document.getElementById('loopEnd').value = (audioEl.currentTime || 0).toFixed(1);
  });
  document.getElementById('startLoopBtn').addEventListener('click', () => {
    if (!currentAudioFile || isLooping) return;
    isLooping = true; loopCounter = 0;
    const start = parseFloat(document.getElementById('loopStart').value) || 0;
    const end   = parseFloat(document.getElementById('loopEnd').value)   || audioEl.duration;
    const maxCount = parseInt(document.getElementById('loopCount').value) || 0;
    audioEl.currentTime = start;
    audioEl.play().then(() => syncPlayIcons(true)).catch(() => {});
    function checkLoop() {
      if (!isLooping) return;
      if (audioEl.currentTime >= end) {
        loopCounter++;
        if (maxCount > 0 && loopCounter >= maxCount) { isLooping = false; audioEl.pause(); syncPlayIcons(false); return; }
        audioEl.currentTime = start;
      }
      requestAnimationFrame(checkLoop);
    }
    requestAnimationFrame(checkLoop);
  });
  document.getElementById('stopLoopBtn').addEventListener('click', () => { isLooping = false; });

  // ── audio 元素 timeupdate 补充（MediaElement 后端已接管，此为保险）──
  audioEl.addEventListener('timeupdate', () => {
    const t = audioEl.currentTime, d = audioEl.duration || 0;
    document.getElementById('currentTime').textContent = formatTime(t);
    updateLiteProgress(t, d);
  });

  renderPlaylist();
</script>
</body>
</html>
